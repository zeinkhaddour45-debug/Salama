  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {

      --sage-light:  #adc4a6;

    html { scroll-behavior: smooth; }

    body {

    body::before {

    nav {

      box-shadow: 0 1px 0 rgba(0,0,0,0.06);

    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 3px;
      color: var(--text);
      text-decoration: none;
      display: inline-flex;
      align-items: center;

    .nav-logo svg { flex-shrink: 0; }
    .nav-right {

    .nav-user {

      color: var(--text-light);

    .nav-back {

      padding: 24px 28px;

      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--olive);
      font-weight: 600;
      margin-bottom: 12px;

    /* Dropdown trigger */
    .prompt-dropdown {
      position: relative;
    }
    .prompt-trigger {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      background: rgba(255,255,255,0.6);
      border: 1.5px solid rgba(125,158,117,0.3);
      border-radius: 14px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      font-family: 'Inter', sans-serif;
      text-align: left;
    }
    .prompt-trigger:hover {
      border-color: var(--sage);
      background: rgba(255,255,255,0.82);
    }
    .prompt-trigger.open {
      border-color: var(--olive);
      box-shadow: 0 0 0 3px rgba(74,102,64,0.08);
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;

    .prompt-trigger-text {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 15px;
      color: var(--text-mid);
      flex: 1;
      line-height: 1.5;

    .prompt-trigger-text.selected {
      color: var(--text);
      font-style: italic;
    }
    .prompt-trigger-chevron {
      flex-shrink: 0;
      color: var(--text-light);
      transition: transform 0.25s;
    }
    .prompt-trigger.open .prompt-trigger-chevron {
      transform: rotate(180deg);
    }

    /* Dropdown list */
    .prompt-options {
      display: none;
      position: absolute;
      top: 100%;
      left: 0; right: 0;
      background: rgba(252,250,246,0.98);
      border: 1.5px solid var(--olive);
      border-top: none;

      border-bottom-right-radius: 14px;
      overflow: hidden;
      z-index: 50;
      box-shadow: 0 12px 32px rgba(0,0,0,0.1);
    }
    .prompt-options.open { display: block; }
    .prompt-option {
      width: 100%;
      display: block;
      padding: 13px 18px;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 14px;
      color: var(--text-mid);
      background: none;
      border: none;
      border-bottom: 1px solid rgba(125,158,117,0.12);
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, color 0.15s;
      line-height: 1.55;

    .prompt-option:last-child { border-bottom: none; }

    .prompt-option.active { background: rgba(74,102,64,0.08); color: var(--olive-dark); font-style: italic; }

      font-weight: 500;
      color: var(--text-light);

    /* SAVED ENTRIES */
    .entries-section {
      max-width: 720px;
      margin: 0 auto 60px;
      position: relative;
      z-index: 1;
    }
    .entries-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--text);

      padding: 32px 0;

    .entry-card {

      backdrop-filter: blur(10px);
      border: 1px solid rgba(200,217,194,0.4);
      border-radius: 20px;
      padding: 28px 32px;
      margin-bottom: 16px;
      position: relative;
    }
    .entry-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .entry-date {
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--sage);
      font-weight: 600;
    }
    .entry-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-light);
      font-size: 14px;
      padding: 4px 8px;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .entry-delete:hover { color: #c0392b; background: rgba(192,57,43,0.06); }
    .entry-prompt {
      font-size: 12px;
      font-style: italic;
      color: var(--text-light);
      margin-bottom: 10px;
    }
    .entry-body {
      font-size: 14px;
      color: var(--text-mid);
      line-height: 1.75;
      white-space: pre-wrap;
    }

    /* LOADING SPINNER */
    .entries-loading {
      text-align: center;
      padding: 32px 0;
      color: var(--text-light);
      font-size: 14px;
    }

    /* SAVED TOAST */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--olive);
      color: white;
      padding: 12px 28px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
      z-index: 200;
      transition: transform 0.35s ease;
      pointer-events: none;

    .toast.show { transform: translateX(-50%) translateY(0); }

    }

  <script>
    const SUPABASE_URL = 'https://yrbcozgtjjzexrqoynax.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_XMbgbPt2RZD_yeCEbc94oQ_7m2PQs5g';
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    const urlEmotion = new URLSearchParams(window.location.search).get('emotion') || '';
    const emotionEmojis = { Calm: '😌', Anxious: '😰', Overwhelmed: '😮‍💨', Hopeful: '🌱' };

    const emotionPrompts = {
      Calm: [
        "What helped me feel calm today?",
        "What moments brought me peace?",
        "What supports my sense of well-being?",
        "What small joy did I notice today?",
        "What does rest look like for me right now?"
      ],
      Anxious: [
        "What is making me feel anxious right now?",
        "What is within my control today?",
        "What would I say to a friend feeling this way?",
        "What does my body need from me right now?",
        "What has helped me feel safer in the past?"
      ],
      Overwhelmed: [
        "What is feeling heaviest right now?",
        "What can I set down, even just for today?",
        "What is one small thing I can do for myself?",
        "What do I wish someone understood about how I'm feeling?",
        "What would make tomorrow feel a little gentler?"
      ],
      Hopeful: [
        "What is making me feel hopeful right now?",
        "What do I feel called toward today?",
        "What am I grateful for in this moment?",
        "What small step aligns with where I want to go?",
        "Who can I show up for today?"
      ],
      default: [
        "What emotions have I been carrying lately?",
        "What am I grateful for right now?",
        "What do I need more of in my life?",
        "What am I proud of, even if it feels small?",
        "Where do I feel tension, and what might it be telling me?"
      ]
    };

    let activePrompt = null;
    let dropdownOpen = false;

    function getPrompts() {
      return emotionPrompts[urlEmotion] || emotionPrompts.default;
    }

    function renderPromptOptions() {
      const opts = document.getElementById('prompt-options');
      const list = getPrompts();
      opts.innerHTML = '';
      list.forEach(function(p) {
        const btn = document.createElement('button');
        btn.className = 'prompt-option';
        btn.textContent = p;
        btn.onclick = function() { selectPrompt(p); };
        opts.appendChild(btn);
      });
      const free = document.createElement('button');
      free.className = 'prompt-option freestyle';
      free.textContent = '✦ Freestyle: write freely';
      free.onclick = function() { selectPrompt(null); };
      opts.appendChild(free);
    }

    function toggleDropdown() {
      dropdownOpen = !dropdownOpen;
      document.getElementById('prompt-trigger').classList.toggle('open', dropdownOpen);
      document.getElementById('prompt-options').classList.toggle('open', dropdownOpen);
    }

    function closeDropdown() {
      dropdownOpen = false;
      document.getElementById('prompt-trigger').classList.remove('open');
      document.getElementById('prompt-options').classList.remove('open');
    }

    function selectPrompt(p) {
      document.querySelectorAll('.prompt-option').forEach(function(c) { c.classList.remove('active'); });
      activePrompt = p;
      const triggerText = document.getElementById('prompt-trigger-text');
      if (p) {
        triggerText.textContent = p;
        triggerText.classList.add('selected');
        document.getElementById('journal-input').placeholder = 'Start writing here… your thoughts are safe in this space.';
        // mark active option
        document.querySelectorAll('.prompt-option').forEach(function(c) {
          if (c.textContent === p) c.classList.add('active');
        });
      } else {
        triggerText.textContent = '✦ Freestyle: write freely';
        triggerText.classList.add('selected');
        document.getElementById('journal-input').placeholder = 'Write freely… no prompt, no rules. Just you.';
        document.querySelectorAll('.prompt-option.freestyle').forEach(function(c) { c.classList.add('active'); });
      }
      closeDropdown();
      document.getElementById('journal-input').focus();
    }

    // Close dropdown when clicking outside
    document.addEventListener('click', function(e) {
      if (dropdownOpen && !document.getElementById('prompt-dropdown').contains(e.target)) {
        closeDropdown();
      }
    });

    // Auth guard, runs immediately on page load
    async function init() {
      const { data: { session } } = await db.auth.getSession();

      if (!session) {
        window.location.href = 'login.html?redirect=journaling.html';
        return;
      }

      currentUser = session.user;
      document.getElementById('nav-user-email').textContent = currentUser.email;
      renderPromptOptions();
      document.body.classList.add('ready');

      await renderEntries();
    }

    async function signOut() {
      await db.auth.signOut();
      window.location.href = 'login.html';
    }


    function updateWordCount() {
      const text = document.getElementById('journal-input').value.trim();
      const count = text === '' ? 0 : text.split(/\s+/).length;
      document.getElementById('word-count').textContent = count;
    }

    function clearEntry() {
      document.getElementById('journal-input').value = '';
      updateWordCount();
    }

    async function saveEntry() {
      const text = document.getElementById('journal-input').value.trim();
      if (!text) return;

      const btn = document.getElementById('save-btn');
      btn.disabled = true;
      btn.textContent = 'Saving…';

      const { error } = await db.from('journal_entries').insert({
        user_id: currentUser.id,
        prompt: activePrompt || null,
        content: text,
        emotion: urlEmotion || null
      });

      btn.disabled = false;
      btn.textContent = 'Save Entry';

      if (error) {
        console.error('Save error:', error);
        showToast('Could not save. Please try again.', true);
        return;
      }

      clearEntry();
      await renderEntries();
      showToast('Entry saved ✓', false);
    }

    async function deleteEntry(id) {
      const { error } = await db
        .from('journal_entries')
        .delete()
        .eq('id', id);

      if (!error) await renderEntries();
    }

    async function renderEntries() {
      const list = document.getElementById('entries-list');

      const { data: entries, error } = await db
        .from('journal_entries')
        .select('*')
        .order('created_at', { ascending: false });

      if (error || !entries || entries.length === 0) {
        list.innerHTML = '<p class="no-entries">Your saved entries will appear here.</p>';
        return;
      }

      list.innerHTML = entries.map(function(e) {
        const date = new Date(e.created_at).toLocaleDateString('en-GB', {
          weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });
        const emoji = e.emotion ? (emotionEmojis[e.emotion] || '💭') : null;
        const emotionBadge = emoji
          ? '<span style="display:inline-flex;align-items:center;gap:4px;background:rgba(125,158,117,0.13);border:1px solid rgba(74,102,64,0.18);border-radius:100px;padding:2px 10px;font-size:11px;font-weight:600;color:#4a6640;">' + emoji + ' ' + e.emotion + '</span>'
          : '';
        return '<div class="entry-card">' +
          '<div class="entry-meta">' +
            '<div style="display:flex;align-items:center;gap:8px;">' +
              '<span class="entry-date">' + date + '</span>' +
              emotionBadge +
            '</div>' +
            '<button class="entry-delete" onclick="deleteEntry(\'' + e.id + '\')">✕ Delete</button>' +
          '</div>' +
          (e.prompt ? '<p class="entry-prompt">Prompt: ' + e.prompt + '</p>' : '') +
          '<p class="entry-body">' + e.content.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</p>' +
        '</div>';
      }).join('');
    }

    function showToast(message, isError) {
      const toast = document.getElementById('toast');
      toast.textContent = message || 'Entry saved ✓';
      toast.style.background = isError ? '#c0392b' : '';
      toast.classList.add('show');
      setTimeout(function() { toast.classList.remove('show'); }, 2500);
    }

    init();
  </script>

<script src="chat-widget.js"></script>
</body>
</html>
