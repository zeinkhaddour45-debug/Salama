<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | Salama</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:       #f5f0e8;
      --cream-dark:  #ece5d8;
      --sage:        #7d9e75;
      --sage-light:  #adc4a6;
      --sage-muted:  #c8d9c2;
      --olive:       #4a6640;
      --olive-dark:  #374f31;
      --text:        #2a2722;
      --text-mid:    #5a5650;
      --text-light:  #8a8680;
      --white:       #ffffff;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.032;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 60px;
      background: rgba(245, 240, 232, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 1px 0 rgba(0,0,0,0.06);
    }
    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 3px;
      color: var(--text);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 9px;
    }
    .nav-logo svg { flex-shrink: 0; }

    /* LEAF DECORATIONS */
    .leaf {
      position: fixed;
      pointer-events: none;
      opacity: 0.18;
      z-index: 0;
    }
    .leaf-1 { top: 20%; left: -20px; width: 220px; transform: rotate(-18deg); }
    .leaf-2 { bottom: 10%; right: -10px; width: 190px; transform: rotate(158deg); }

    /* PAGE */
    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 24px 60px;
      background:
        radial-gradient(ellipse 800px 600px at 10% 10%, rgba(125,158,117,0.22) 0%, transparent 65%),
        radial-gradient(ellipse 600px 500px at 90% 85%, rgba(157,180,150,0.18) 0%, transparent 65%),
        var(--cream);
      position: relative;
    }

    /* AUTH CARD */
    .auth-card {
      width: 100%;
      max-width: 440px;
      background: rgba(245,240,232,0.82);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(200,217,194,0.5);
      border-radius: 32px;
      padding: 52px 48px;
      position: relative;
      z-index: 1;
      box-shadow: 0 20px 60px rgba(74,102,64,0.10);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 36px;
    }
    .auth-label {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--sage);
      font-weight: 600;
      margin-bottom: 12px;
    }
    .auth-title {
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 10px;
    }
    .auth-title em { font-style: italic; color: var(--olive); }
    .auth-sub {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* TABS */
    .tab-toggle {
      display: flex;
      background: rgba(200,217,194,0.3);
      border-radius: 100px;
      padding: 4px;
      margin-bottom: 32px;
    }
    .tab {
      flex: 1;
      padding: 10px 16px;
      border-radius: 100px;
      border: none;
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-light);
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab.active {
      background: var(--white);
      color: var(--olive);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    /* FORM */
    .auth-form { display: flex; flex-direction: column; gap: 14px; }
    .auth-form.hidden { display: none; }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-mid);
      letter-spacing: 0.3px;
    }
    .form-input {
      width: 100%;
      padding: 13px 18px;
      background: rgba(245,240,232,0.9);
      border: 1.5px solid rgba(200,217,194,0.7);
      border-radius: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input::placeholder { color: var(--text-light); }
    .form-input:focus {
      border-color: var(--olive);
      box-shadow: 0 0 0 4px rgba(74,102,64,0.08);
    }

    .btn-submit {
      width: 100%;
      background: var(--olive);
      color: var(--white);
      padding: 14px 24px;
      border-radius: 100px;
      font-size: 15px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(74,102,64,0.32);
      font-family: 'Inter', sans-serif;
      margin-top: 6px;
    }
    .btn-submit:hover:not(:disabled) { background: var(--olive-dark); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(74,102,64,0.42); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* MESSAGES */
    .auth-message {
      margin-top: 18px;
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 13.5px;
      line-height: 1.55;
      text-align: center;
      display: none;
    }
    .auth-message.error {
      display: block;
      background: rgba(192,57,43,0.08);
      color: #c0392b;
      border: 1px solid rgba(192,57,43,0.18);
    }
    .auth-message.success {
      display: block;
      background: rgba(74,102,64,0.08);
      color: var(--olive);
      border: 1px solid rgba(74,102,64,0.18);
    }

    /* SUCCESS STATE */
    .success-state {
      text-align: center;
      display: none;
    }
    .success-state.visible { display: block; }
    .success-icon { font-size: 48px; margin-bottom: 20px; }
    .success-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 12px;
    }
    .success-body {
      font-size: 14px;
      color: var(--text-mid);
      line-height: 1.7;
      margin-bottom: 24px;
    }
    .btn-ghost-link {
      background: none;
      border: none;
      color: var(--olive);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* REMEMBER ME / FORGOT */
    .remember-row {
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
    }
    .remember-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-mid);
      cursor: pointer;
      user-select: none;
    }
    .remember-label input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: var(--olive);
      cursor: pointer;
    }
    .forgot-link {
      background: none;
      border: none;
      color: var(--olive);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .forgot-link:disabled { opacity: 0.5; cursor: not-allowed; }

    /* PASSWORD STRENGTH */
    .pw-strength {
      height: 4px;
      border-radius: 4px;
      background: var(--cream-dark);
      overflow: hidden;
      margin-top: 6px;
    }
    .pw-strength-bar {
      height: 100%;
      border-radius: 4px;
      width: 0%;
      transition: width 0.3s, background 0.3s;
    }
    .pw-strength-hint {
      font-size: 11px;
      color: var(--text-light);
      margin-top: 4px;
      min-height: 16px;
    }

    /* LOGGED IN STATE */
    .logged-in-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-top: 24px;
    }
    .btn-danger-link {
      background: none;
      border: none;
      color: #b03a2e;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    @media (max-width: 480px) {
      nav { padding: 16px 20px; }
      .auth-card { padding: 40px 28px; }
    }
    @media (max-width: 768px) { .leaf { display: none !important; } }
  </style>
</head>
<body>

  <!-- Leaf decorations -->
  <svg class="leaf leaf-1" viewBox="0 0 200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M100 285 C100 285 18 198 18 118 C18 48 58 8 100 8 C142 8 182 48 182 118 C182 198 100 285 100 285Z" stroke="#4a6640" stroke-width="2.5" fill="rgba(74,102,64,0.38)"/>
    <path d="M100 285 L100 8" stroke="#4a6640" stroke-width="2"/>
    <path d="M100 75 C80 65 50 74 30 96" stroke="#4a6640" stroke-width="1.5" opacity="0.85"/>
    <path d="M100 115 C80 105 44 116 24 140" stroke="#4a6640" stroke-width="1.5" opacity="0.85"/>
    <path d="M100 155 C80 145 44 156 24 180" stroke="#4a6640" stroke-width="1.5" opacity="0.75"/>
    <path d="M100 75 C120 65 150 74 170 96" stroke="#4a6640" stroke-width="1.5" opacity="0.85"/>
    <path d="M100 115 C120 105 156 116 176 140" stroke="#4a6640" stroke-width="1.5" opacity="0.85"/>
    <path d="M100 155 C120 145 156 156 176 180" stroke="#4a6640" stroke-width="1.5" opacity="0.75"/>
  </svg>
  <svg class="leaf leaf-2" viewBox="0 0 200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M100 285 C100 285 18 198 18 118 C18 48 58 8 100 8 C142 8 182 48 182 118 C182 198 100 285 100 285Z" stroke="#4a6640" stroke-width="2.5" fill="rgba(74,102,64,0.35)"/>
    <path d="M100 285 L100 8" stroke="#4a6640" stroke-width="2"/>
    <path d="M100 75 C80 65 50 74 30 96" stroke="#4a6640" stroke-width="1.5" opacity="0.85"/>
    <path d="M100 115 C80 105 44 116 24 140" stroke="#4a6640" stroke-width="1.5" opacity="0.85"/>
    <path d="M100 75 C120 65 150 74 170 96" stroke="#4a6640" stroke-width="1.5" opacity="0.85"/>
    <path d="M100 115 C120 105 156 116 176 140" stroke="#4a6640" stroke-width="1.5" opacity="0.85"/>
  </svg>

  <nav>
    <a class="nav-logo" href="index.html">
      <svg width="16" height="22" viewBox="0 0 16 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8,21 L8,4" stroke="rgba(74,102,64,0.55)" stroke-width="1.1" stroke-linecap="round"/>
        <path d="M8,15 C4.5,13 1.5,9.5 3.5,6.5 C5,4.5 8,8 8,15Z" fill="rgba(74,102,64,0.8)"/>
        <path d="M8,15 C11.5,13 14.5,9.5 12.5,6.5 C11,4.5 8,8 8,15Z" fill="rgba(74,102,64,0.8)"/>
        <path d="M8,8 C5.5,5.5 5.5,1.5 8,0.5 C10.5,1.5 10.5,5.5 8,8Z" fill="rgba(74,102,64,0.9)"/>
      </svg>
      SALAMA
    </a>
  </nav>

  <div class="page">
    <div class="auth-card">

      <!-- Main auth UI -->
      <div id="auth-ui">
        <div class="auth-header">
          <p class="auth-label">Your Journal</p>
          <h1 class="auth-title">Welcome to <em>Salama</em></h1>
          <p class="auth-sub">Sign in to access your private journal entries.</p>
        </div>

        <div class="tab-toggle">
          <button class="tab active" id="tab-signin" onclick="showTab('signin')">Sign In</button>
          <button class="tab" id="tab-signup" onclick="showTab('signup')">Create Account</button>
        </div>

        <!-- Sign In Form -->
        <form class="auth-form" id="signin-form" onsubmit="handleSignIn(event)">
          <div class="form-group">
            <label class="form-label" for="signin-email">Email address</label>
            <input class="form-input" type="email" id="signin-email" placeholder="you@example.com" required autocomplete="email" />
          </div>
          <div class="form-group">
            <label class="form-label" for="signin-password">Password</label>
            <input class="form-input" type="password" id="signin-password" placeholder="••••••••" required autocomplete="current-password" />
          </div>
          <div class="form-group remember-row">
            <label class="remember-label">
              <input type="checkbox" id="remember-me" checked />
              Remember me
            </label>
            <button type="button" class="forgot-link" id="forgot-btn" onclick="handleForgotPassword()">Forgot password?</button>
          </div>
          <button class="btn-submit" type="submit" id="signin-btn">Sign In</button>
        </form>

        <!-- Sign Up Form -->
        <form class="auth-form hidden" id="signup-form" onsubmit="handleSignUp(event)">
          <div class="form-group">
            <label class="form-label" for="signup-email">Email address</label>
            <input class="form-input" type="email" id="signup-email" placeholder="you@example.com" required autocomplete="email" />
          </div>
          <div class="form-group">
            <label class="form-label" for="signup-password">Password</label>
            <input class="form-input" type="password" id="signup-password" placeholder="Min 8 chars + 1 number" required autocomplete="new-password" minlength="8" oninput="updatePasswordStrength(this.value)" />
            <div class="pw-strength"><div class="pw-strength-bar" id="pw-bar"></div></div>
            <p class="pw-strength-hint" id="pw-hint"></p>
          </div>
          <button class="btn-submit" type="submit" id="signup-btn">Create Account</button>
        </form>

        <p class="auth-message" id="auth-message"></p>
      </div>

      <!-- Already logged in state -->
      <div class="success-state" id="logged-in-state">
        <div class="success-icon">🌿</div>
        <h2 class="success-title">Welcome back</h2>
        <p class="success-body">You're signed in as<br><strong id="logged-in-email" style="color: var(--olive);"></strong></p>
        <div class="logged-in-actions">
          <a href="journaling.html" class="btn-submit" style="display:block; text-decoration:none; text-align:center;">Continue to Journal</a>
          <button onclick="handleSignOut()" class="btn-danger-link">Sign out of this device</button>
        </div>
      </div>

      <!-- Email confirmation success state -->
      <div class="success-state" id="success-state">
        <div class="success-icon">✉️</div>
        <h2 class="success-title">Check your email</h2>
        <p class="success-body">We sent a confirmation link to your email address. Click it to activate your account, then come back to sign in.</p>
        <button class="btn-ghost-link" onclick="showTab('signin'); document.getElementById('success-state').classList.remove('visible'); document.getElementById('auth-ui').style.display = '';">Back</button>
      </div>

    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://yrbcozgtjjzexrqoynax.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_XMbgbPt2RZD_yeCEbc94oQ_7m2PQs5g';
    const { createClient } = supabase;

    let _activeClient = null;

    // Create a Supabase client using either localStorage (persistent) or sessionStorage (tab-only)
    function makeClient(useSessionStorage) {
      return createClient(SUPABASE_URL, SUPABASE_KEY, {
        auth: { persistSession: true, storage: useSessionStorage ? sessionStorage : localStorage }
      });
    }

    function safeRedirect() {
      const raw = new URLSearchParams(window.location.search).get('redirect') || '';
      if (raw && /^\/[^/]/.test(raw)) return raw;
      return 'index.html';
    }

    // On page load: check both storages for an existing session
    (async function init() {
      const persistDb = makeClient(false);
      const { data: { session } } = await persistDb.auth.getSession();
      if (session) { showLoggedIn(session, persistDb); return; }

      const tempDb = makeClient(true);
      const { data: { session: tempSession } } = await tempDb.auth.getSession();
      if (tempSession) { showLoggedIn(tempSession, tempDb); }
    })();

    function showLoggedIn(session, client) {
      _activeClient = client;
      document.getElementById('auth-ui').style.display = 'none';
      document.getElementById('logged-in-state').classList.add('visible');
      document.getElementById('logged-in-email').textContent = session.user.email;
    }

    async function handleSignOut() {
      if (_activeClient) await _activeClient.auth.signOut();
      _activeClient = null;
      document.getElementById('logged-in-state').classList.remove('visible');
      document.getElementById('auth-ui').style.display = '';
    }

    // Open the correct tab based on URL parameter
    if (new URLSearchParams(window.location.search).get('tab') === 'signup') {
      showTab('signup');
    }

    function showTab(tab) {
      const isSignin = tab === 'signin';
      document.getElementById('tab-signin').classList.toggle('active', isSignin);
      document.getElementById('tab-signup').classList.toggle('active', !isSignin);
      document.getElementById('signin-form').classList.toggle('hidden', !isSignin);
      document.getElementById('signup-form').classList.toggle('hidden', isSignin);
      hideMessage();
    }

    function showMessage(text, type) {
      const el = document.getElementById('auth-message');
      el.textContent = text;
      el.className = 'auth-message ' + type;
    }

    function hideMessage() {
      document.getElementById('auth-message').className = 'auth-message';
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.textContent = loading ? 'Please wait…' : (btnId === 'signin-btn' ? 'Sign In' : 'Create Account');
    }

    function validatePassword(password) {
      if (password.length < 8) return 'Password must be at least 8 characters.';
      if (!/\d/.test(password)) return 'Password must include at least one number.';
      return null;
    }

    function updatePasswordStrength(password) {
      const bar = document.getElementById('pw-bar');
      const hint = document.getElementById('pw-hint');
      if (!bar) return;
      if (!password) { bar.style.width = '0%'; hint.textContent = ''; return; }

      let score = 0;
      if (password.length >= 8) score++;
      if (/\d/.test(password)) score++;
      if (/[A-Z]/.test(password)) score++;
      if (/[^a-zA-Z0-9]/.test(password)) score++;

      const colors = ['#c0392b', '#e67e22', '#7d9e75', '#4a6640'];
      const labels = ['Too weak', 'Weak', 'Good', 'Strong'];
      const widths  = ['25%', '50%', '75%', '100%'];
      const i = Math.max(0, score - 1);
      bar.style.width = widths[i];
      bar.style.background = colors[i];
      hint.textContent = labels[i];
      hint.style.color = colors[i];
    }

    async function handleSignIn(e) {
      e.preventDefault();
      const email = document.getElementById('signin-email').value.trim();
      const password = document.getElementById('signin-password').value;
      const rememberMe = document.getElementById('remember-me').checked;
      setLoading('signin-btn', true);
      hideMessage();

      const client = makeClient(!rememberMe); // session-only storage if not remembering
      const { error } = await client.auth.signInWithPassword({ email, password });
      setLoading('signin-btn', false);

      if (error) { showMessage(error.message, 'error'); return; }
      window.location.href = safeRedirect();
    }

    async function handleSignUp(e) {
      e.preventDefault();
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;

      const pwError = validatePassword(password);
      if (pwError) { showMessage(pwError, 'error'); return; }

      setLoading('signup-btn', true);
      hideMessage();

      const client = makeClient(false);
      const { data, error } = await client.auth.signUp({ email, password });
      setLoading('signup-btn', false);

      if (error) { showMessage(error.message, 'error'); return; }

      if (data.session) { window.location.href = safeRedirect(); return; }

      document.getElementById('auth-ui').style.display = 'none';
      document.getElementById('success-state').classList.add('visible');
    }

    async function handleForgotPassword() {
      const email = document.getElementById('signin-email').value.trim();
      if (!email) { showMessage('Enter your email address above first.', 'error'); return; }

      const btn = document.getElementById('forgot-btn');
      btn.textContent = 'Sending…';
      btn.disabled = true;

      const client = makeClient(false);
      const { error } = await client.auth.resetPasswordForEmail(email, {
        redirectTo: 'https://www.salamaworld.com/login.html'
      });

      btn.textContent = 'Forgot password?';
      btn.disabled = false;

      if (error) { showMessage(error.message, 'error'); return; }
      showMessage('Password reset email sent! Check your inbox.', 'success');
    }
  </script>

</body>
</html>
